services:
  newt:
    image: fosrl/newt
    container_name: newt
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    network_mode: host
    environment:
      - PANGOLIN_ENDPOINT=https://pangolin.${BASE_DOMAIN}
      - NEWT_ID=${NEWT_ID}
      - NEWT_SECRET=${NEWT_SECRET}

  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    restart: unless-stopped
    ports:
      - "127.0.0.1:8096:8096"
    volumes:
      - jellyfin-config:/config
      - jellyfin-cache:/cache
      - type: bind
        source: ${JELLYFIN_MEDIA_PATH}
        target: /media
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  # Immich — self-hosted photo/video management
  immich-server:
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    container_name: immich_server
    restart: always
    ports:
      - "127.0.0.1:2283:2283"
    volumes:
      - ${IMMICH_LIBRARY_PATH}:/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      - DB_PASSWORD=${IMMICH_DB_PASSWORD}
      - DB_USERNAME=${IMMICH_DB_USERNAME}
      - DB_DATABASE_NAME=${IMMICH_DB_DATABASE_NAME}
      - REDIS_HOSTNAME=immich-redis
      - REDIS_PASSWORD=${IMMICH_REDIS_PASSWORD}
      - DB_HOSTNAME=immich-database
    depends_on:
      - immich-redis
      - immich-database

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    container_name: immich_machine_learning
    restart: always
    volumes:
      - immich-model-cache:/cache

  immich-redis:
    image: docker.io/valkey/valkey:9
    container_name: immich_redis
    restart: always
    command: valkey-server --requirepass ${IMMICH_REDIS_PASSWORD}
    healthcheck:
      test: redis-cli -a ${IMMICH_REDIS_PASSWORD} ping || exit 1

  immich-database:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    container_name: immich_postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: ${IMMICH_DB_PASSWORD}
      POSTGRES_USER: ${IMMICH_DB_USERNAME}
      POSTGRES_DB: ${IMMICH_DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${IMMICH_DB_PATH}:/var/lib/postgresql/data
    shm_size: 128mb

  # Open WebUI + Ollama — local LLM interface
  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ${OLLAMA_DATA_PATH}:/root/.ollama

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - OLLAMA_BASE_URLS=${OPEN_WEBUI_OLLAMA_URLS:-http://ollama:11434}
      - OPENAI_API_BASE_URLS=${OLLAMA_CLOUD_API_KEY:+https://ollama.com/v1}
      - OPENAI_API_KEYS=${OLLAMA_CLOUD_API_KEY:-}
      - DEFAULT_PROMPT_SUGGESTIONS=[{}]
      - ENABLE_PERSISTENT_CONFIG=False
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      - ollama
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  # Perforce Helix Core — version control server
  perforce:
    build: ./perforce
    container_name: perforce
    restart: unless-stopped
    ports:
      - "127.0.0.1:1666:1666"
    volumes:
      - /mnt/vault-3/Perforce:/data

  # Websidian — self-hosted Obsidian vault web viewer
  websidian:
    build: ./websidian
    container_name: websidian
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WEBSIDIAN_HOST_PORT:-3200}:${WEBSIDIAN_PORT:-3000}"
    volumes:
      - ${VAULT_PATH}:/vault:ro
    environment:
      - VAULT_PATH=/vault
      - HIDE_FOLDERS=${WEBSIDIAN_HIDE_FOLDERS:-.obsidian,.git,.trash,.stversions,.stfolder,.claude}
      - PORT=${WEBSIDIAN_PORT:-3000}

volumes:
  jellyfin-config:
    external: true
  jellyfin-cache:
    external: true
  open-webui-data:
  immich-model-cache:
