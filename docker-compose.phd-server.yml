services:
  newt:
    image: fosrl/newt
    container_name: newt
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    network_mode: host
    environment:
      - PANGOLIN_ENDPOINT=https://pangolin.parkerhdavis.com
      - NEWT_ID=${NEWT_ID}
      - NEWT_SECRET=${NEWT_SECRET}

  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    restart: unless-stopped
    ports:
      - 8096:8096
    volumes:
      - jellyfin-config:/config
      - jellyfin-cache:/cache
      - type: bind
        source: /mnt/vault-2/Jellyfin
        target: /media
    extra_hosts:
      - 'host.docker.internal:host-gateway'

