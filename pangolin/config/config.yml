app:
  dashboard_url: "https://pangolin.parkerhdavis.com"
  log_level: "debug"
  save_logs: false

server:
  external_port: 3000
  internal_port: 3001
  next_port: 3002
  internal_hostname: "pangolin"
  session_cookie_name: "p_session_token"
  resource_access_token_param: "p_token"
  resource_session_request_param: "p_session_request"
  cors:
    origins:
      - "https://pangolin.parkerhdavis.com"
    methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "PATCH"
    credentials: true
  trust_proxy: 1

domains:
  parkerhdavis:
    base_domain: "parkerhdavis.com"
    cert_resolver: "letsencrypt"
    prefer_wildcard_cert: false

traefik:
  http_entrypoint: "web"
  https_entrypoint: "websecure"
  cert_resolver: "letsencrypt"
  prefer_wildcard_cert: false

gerbil:
  base_endpoint: "pangolin.parkerhdavis.com"
  start_port: 51820
  subnet_group: "10.0.0.0/8"
  block_size: 24
  site_block_size: 30
  use_subdomain: false

flags:
  require_email_verification: false
  disable_signup_without_invite: true
  disable_user_create_org: false
  allow_raw_resources: true
